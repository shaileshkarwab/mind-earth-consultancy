name: Build and Deploy to Windows VPS via SSH

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET 8
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Restore
      - name: Restore
        run: dotnet restore back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj

      # 4️⃣ Build
      - name: Build
        run: dotnet build back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --no-restore

      # 5️⃣ Publish
      - name: Publish
        run: dotnet publish back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --output publish --no-build

      # 6️⃣ Zip
      - name: Zip Publish
        run: zip -r publish.zip ./publish

      # 7️⃣ Copy to VPS
      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "publish.zip"
          target: "C:/mind-earth"
          port: 22
          insecure: true

      # 8️⃣ Deploy on VPS (CMD only)
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          insecure: true
          script: |
            echo ===== START DEPLOYMENT =====

            REM Create base folder
            if not exist C:\mind-earth mkdir C:\mind-earth

            REM Clean deploy folder
            if exist C:\mind-earth\deploy rmdir /s /q C:\mind-earth\deploy
            mkdir C:\mind-earth\deploy

            REM Check zip exists
            if not exist C:\mind-earth\publish.zip (
              echo ZIP NOT FOUND
              exit /b 1
            )

            echo Extracting ZIP...

            REM Extract using tar (works on Windows)
            tar -xf C:\mind-earth\publish.zip -C C:\mind-earth\deploy

            echo Files after extraction:
            dir C:\mind-earth\deploy

            echo Stopping IIS...
            iisreset /stop

            echo Copying files...

            if exist C:\mind-earth\deploy\publish (
              robocopy C:\mind-earth\deploy\publish C:\Inetpub\vhosts\mindearthconsultancy.com\admin-api.mindearthconsultancy.com /MIR
            ) else (
              robocopy C:\mind-earth\deploy C:\Inetpub\vhosts\mindearthconsultancy.com\admin-api.mindearthconsultancy.com /MIR
            )

            echo Starting IIS...
            iisreset /start

            echo ===== DEPLOYMENT COMPLETED =====
