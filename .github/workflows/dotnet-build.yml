name: Build and Deploy to Windows VPS via SSH

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET 8
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Restore
      - name: Restore
        run: dotnet restore back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj

      # 4️⃣ Build
      - name: Build
        run: dotnet build back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --no-restore

      # 5️⃣ Publish
      - name: Publish
        run: dotnet publish back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --output publish --no-build

      # 6️⃣ Zip
      - name: Zip Publish
        run: zip -r publish.zip ./publish

      # 7️⃣ Copy to VPS
      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "publish.zip"
          target: "C:/mind-earth"
          port: 22
          insecure: true
          debug: true

      # 8️⃣ Deploy on VPS
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          insecure: true
          script: |
            echo "===== START DEPLOYMENT ====="

            # Create base folder
            powershell -Command "if (!(Test-Path 'C:\mind-earth')) { New-Item -ItemType Directory -Path 'C:\mind-earth' }"

            # Clean deploy folder
            powershell -Command "if (Test-Path 'C:\mind-earth\deploy') { Remove-Item -Recurse -Force 'C:\mind-earth\deploy' }"
            powershell -Command "New-Item -ItemType Directory -Path 'C:\mind-earth\deploy'"

            # Check zip exists
            powershell -Command "if (!(Test-Path 'C:\mind-earth\publish.zip')) { Write-Output 'ZIP NOT FOUND'; exit 1 }"

            # Show zip size
            echo "ZIP SIZE:"
            powershell -Command "(Get-Item 'C:\mind-earth\publish.zip').Length"

            # Extract ZIP using .NET (reliable)
            echo "Extracting ZIP..."
            powershell -Command "Add-Type -AssemblyName System.IO.Compression.FileSystem; [System.IO.Compression.ZipFile]::ExtractToDirectory('C:\mind-earth\publish.zip','C:\mind-earth\deploy')"

            # Show extracted files
            echo "Files after extraction:"
            powershell -Command "Get-ChildItem 'C:\mind-earth\deploy'"

            # Stop IIS
            echo "Stopping IIS..."
            powershell -Command "Import-Module WebAdministration; Stop-WebSite -Name 'admin-api.mindearthconsultancy.com'"

            # Copy files
            echo "Copying files..."
            powershell -Command "if (Test-Path 'C:\mind-earth\deploy\publish') { robocopy 'C:\mind-earth\deploy\publish' 'C:\Inetpub\vhosts\mindearthconsultancy.com\admin-api.mindearthconsultancy.com' /MIR } else { robocopy 'C:\mind-earth\deploy' 'C:\Inetpub\vhosts\mindearthconsultancy.com\admin-api.mindearthconsultancy.com' /MIR }"

            # Start IIS
            echo "Starting IIS..."
            powershell -Command "Start-WebSite -Name 'admin-api.mindearthconsultancy.com'"

            echo "===== DEPLOYMENT COMPLETED ====="
