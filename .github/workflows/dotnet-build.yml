name: Build and Deploy to VPS (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest   # 👈 changed here

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj

      - name: Build
        run: dotnet build back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --output publish --no-build

      - name: Zip Publish
        run: Compress-Archive -Path publish\* -DestinationPath publish.zip

      # Copy to VPS
      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "publish.zip"
          target: "C:/temp"

      # Deploy on VPS
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            powershell -Command "
              Expand-Archive -Path C:\temp\publish.zip -DestinationPath C:\temp\deploy -Force;
              Import-Module WebAdministration;
              Stop-WebSite -Name 'MindEarth';
              robocopy C:\temp\deploy C:\inetpub\wwwroot\MindEarth /MIR;
              Start-WebSite -Name 'MindEarth';
            "
