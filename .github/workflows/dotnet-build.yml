name: Build and Deploy to Windows VPS via SSH

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET 8
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Restore
      - name: Restore
        run: dotnet restore back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj

      # 4️⃣ Build
      - name: Build
        run: dotnet build back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --no-restore

      # 5️⃣ Publish
      - name: Publish
        run: dotnet publish back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --output publish --no-build

      # 6️⃣ Zip ONLY CONTENTS (important fix)
      - name: Zip Publish Output
        run: |
          cd publish
          zip -r ../publish.zip .

      # 7️⃣ Copy to VPS
      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "publish.zip"
          target: "C:/mind-earth"
          port: 22
          insecure: true

      # 8️⃣ Deploy on VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          insecure: true
          script: >
            C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "
            Write-Output '===== START DEPLOYMENT =====';
            New-Item -ItemType Directory -Force -Path 'C:\mind-earth';
            Remove-Item -Recurse -Force 'C:\mind-earth\deploy' -ErrorAction SilentlyContinue;
            New-Item -ItemType Directory -Path 'C:\mind-earth\deploy';
            if (!(Test-Path 'C:\mind-earth\publish.zip')) { Write-Output 'ZIP NOT FOUND'; exit 1 };
            Write-Output 'Extracting ZIP...';
            Add-Type -AssemblyName System.IO.Compression.FileSystem;
            [System.IO.Compression.ZipFile]::ExtractToDirectory('C:\mind-earth\publish.zip','C:\mind-earth\deploy');
            Write-Output 'Files after extraction:';
            Get-ChildItem 'C:\mind-earth\deploy';
            Import-Module WebAdministration;
            Write-Output 'Stopping IIS...';
            Stop-WebSite -Name 'admin-api.mindearthconsultancy.com';
            Write-Output 'Copying files...';
            robocopy 'C:\mind-earth\deploy' 'C:\Inetpub\vhosts\mindearthconsultancy.com\admin-api.mindearthconsultancy.com' /MIR; if ($LASTEXITCODE -lt 8) { exit 0 } else { exit $LASTEXITCODE }
            Write-Output 'Starting IIS...';
            Start-WebSite -Name 'admin-api.mindearthconsultancy.com';
            Write-Output '===== DEPLOYMENT COMPLETED =====';
            "
