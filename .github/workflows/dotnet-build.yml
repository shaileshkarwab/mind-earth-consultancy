name: Build and Deploy to Windows VPS via SSH

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET 8
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Restore
      - name: Restore Dependencies
        run: dotnet restore back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj

      # 4️⃣ Build
      - name: Build Project
        run: dotnet build back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --no-restore

      # 5️⃣ Publish
      - name: Publish Project
        run: dotnet publish back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --output publish --no-build

      # 6️⃣ Zip publish folder
      - name: Zip Publish Folder
        run: zip -r publish.zip ./publish

      # 7️⃣ Copy to VPS via SCP
      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "publish.zip"
          target: "C:/mind-earth"
          port: 22
          insecure: true
          debug: true

      # 8️⃣ Deploy on VPS via SSH
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          insecure: true
          script: |
            powershell -Command "
              Write-Host '===== START DEPLOYMENT ====='

              # Ensure base folder exists
              if (!(Test-Path 'C:\mind-earth')) {
                New-Item -ItemType Directory -Path 'C:\mind-earth'
              }

              # Clean deploy folder completely
              if (Test-Path 'C:\mind-earth\deploy') {
                Remove-Item -Recurse -Force 'C:\mind-earth\deploy'
              }
              New-Item -ItemType Directory -Path 'C:\mind-earth\deploy'

              # Verify ZIP exists
              if (!(Test-Path 'C:\mind-earth\publish.zip')) {
                Write-Host 'ERROR: publish.zip NOT FOUND'
                exit 1
              }

              Write-Host 'ZIP SIZE:'
              (Get-Item 'C:\mind-earth\publish.zip').Length

              Write-Host 'Extracting ZIP using .NET...'

              # Load .NET compression
              Add-Type -AssemblyName System.IO.Compression.FileSystem

              # Extract
              [System.IO.Compression.ZipFile]::ExtractToDirectory(
                'C:\mind-earth\publish.zip',
                'C:\mind-earth\deploy'
              )

              Write-Host 'Files after extraction:'
              Get-ChildItem 'C:\mind-earth\deploy'

              Import-Module WebAdministration

              Write-Host 'Stopping IIS site...'
              Stop-WebSite -Name 'admin-api.mindearthconsultancy.com'

              Write-Host 'Copying files to IIS folder...'

              # Handle both zip structures
              if (Test-Path 'C:\mind-earth\deploy\publish') {
                robocopy 'C:\mind-earth\deploy\publish' 'C:\Inetpub\vhosts\mindearthconsultancy.com\admin-api.mindearthconsultancy.com' /MIR
              } else {
                robocopy 'C:\mind-earth\deploy' 'C:\Inetpub\vhosts\mindearthconsultancy.com\admin-api.mindearthconsultancy.com' /MIR
              }

              Write-Host 'Starting IIS site...'
              Start-WebSite -Name 'admin-api.mindearthconsultancy.com'

              Write-Host '===== DEPLOYMENT COMPLETED ====='
            "
