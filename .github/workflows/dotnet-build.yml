name: Build and Deploy to Windows VPS via SSH

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest   # 👈 SSH works best on Linux runner

    steps:
      # 1️⃣ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET 8
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Restore
      - name: Restore
        run: dotnet restore back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj

      # 4️⃣ Build
      - name: Build
        run: dotnet build back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --no-restore

      # 5️⃣ Publish
      - name: Publish
        run: dotnet publish back_end/MindEarth/MindEarth.Web/MindEarth.Web.csproj --configuration Release --output publish --no-build

      # 6️⃣ Zip
      - name: Zip Publish
        run: zip -r publish.zip ./publish

      # 7️⃣ Copy to VPS (SCP)
      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "publish.zip"
          target: "c:/mind-earth"
          port: 22
          insecure: true

      # 8️⃣ Deploy on VPS (SSH)
      - name: Deploy on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        insecure: true
        script: |
          powershell -Command "
          Write-Host 'Starting deployment...'

          # Ensure folders exist
          if (!(Test-Path 'C:\mind-earth')) { New-Item -ItemType Directory -Path 'C:\mind-earth' }
          if (!(Test-Path 'C:\mind-earth\deploy')) { New-Item -ItemType Directory -Path 'C:\mind-earth\deploy' }

          # Check zip exists
          if (!(Test-Path 'C:\mind-earth\publish.zip')) {
            Write-Host 'ZIP NOT FOUND!'
            exit 1
          }

          Write-Host 'Extracting zip...'

          # Remove old deploy content
          Remove-Item -Recurse -Force C:\mind-earth\deploy\* -ErrorAction SilentlyContinue

          # Extract
          Expand-Archive -Path 'C:\mind-earth\publish.zip' -DestinationPath 'C:\mind-earth\deploy' -Force

          Write-Host 'Files after extraction:'
          Get-ChildItem C:\mind-earth\deploy

          Import-Module WebAdministration

          Write-Host 'Stopping IIS site...'
          Stop-WebSite -Name 'admin-api.mindearthconsultancy.com'

          Write-Host 'Copying files...'
          robocopy C:\mind-earth\deploy\publish C:\Inetpub\vhosts\mindearthconsultancy.com\admin-api.mindearthconsultancy.com /MIR

          Write-Host 'Starting IIS site...'
          Start-WebSite -Name 'admin-api.mindearthconsultancy.com'

          Write-Host 'Deployment completed'
        "
