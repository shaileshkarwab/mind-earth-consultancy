<div class="card card-primary mb-2">
    <div class="card-body">
        <div class="row text-center ">
            <div class="row">
                <div class="col-12">
                    <h6 title="{{user?.firstName}}  {{user?.lastName}}">{{fullName}}</h6>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <img src="/assets/img/avatars/1.png" class="image-preview">
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-12">
                    <h6>{{user?.roleName}}</h6>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-12">
                    <button class="btn btn-sm btn-primary m-2" type="button" (click)="editCommand();" >
                        <i class={{boxIcon.EDIT}}></i>
                    </button>
                    <button class="btn btn-sm btn-danger" type="button" (click)="deleteCommand();">
                        <i class={{boxIcon.DELETE}}></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
