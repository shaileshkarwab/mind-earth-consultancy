<div class="card-body mb-6">
    <app-tool-bar [buttons]="buttons" (clickEvent)="clickCommand($event);"></app-tool-bar>
</div>

<div class="card">

    <div class="card-header">
        <h6 class="card-title">List Of Case Studies/White Papper</h6>
    </div>

    <div class="card-body mb-6">
        <div class="row">
            <div class="col-12">
                <table class="table table-sm table-bordered">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th style="width: 10vw;">Date</th>
                            <th style="width: 10vw;">Type</th>
                            <th>Title</th>
                            <th>Content</th>
                            <th style="width: 10vw;">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let cs of caseStudyList$ | async, let i = index">
                            <td>{{i+1}}</td>
                            <td>{{cs.caseWpDate}}</td>
                            <td>{{cs.entityTypeDesc}}</td>
                            <td>{{cs.title}}</td>
                            <td>{{cs.content}}</td>
                            <td>
                                <app-drop-down-action [data]="cs.rowId!" (deleteEvent)="deleteCommand($event);"
                                    (editEvent)="editCommand($event);"></app-drop-down-action>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
