<aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme">
    <div class="app-brand demo">
        <a href="index.html" class="app-brand-link">
            <span class="app-brand-text demo menu-text fw-bold ms-2">MindEarth</span>
        </a>

        <a href="javascript:void(0);" class="layout-menu-toggle menu-link text-large ms-auto">
            <i class="bx bx-chevron-left d-block d-xl-none align-middle"></i>
        </a>
    </div>



    <ul class="menu-inner py-1">

        <li class="menu-item" [ngClass]="{'active open':menu.toggle,'':!menu.toggle}"
            *ngFor="let menu of menus; let i = index">
            <a href="javascript:void(0);" class="menu-link" [ngClass]="menu.details.length > 0?'menu-toggle':''"
                (click)="toggleMenu(menu)">
                <i class="menu-icon tf-icons bx" [ngClass]="menu.faIcon"></i>
                <div class="text-truncate" data-i18n="Dashboards">{{menu.text}}</div>
            </a>
            <ul class="menu-sub" *ngIf="menu.details.length > 0">
                <li class="menu-item active" *ngFor="let submenu of menu.details; let i = index">
                    <a [routerLink]="['/', 'auth', menu.controller,submenu.pageUrl]" class="menu-link">
                        <div class="text-truncate" data-i18n="Analytics">{{submenu.text}}</div>
                    </a>
                </li>
            </ul>
        </li>
    </ul>
</aside>
